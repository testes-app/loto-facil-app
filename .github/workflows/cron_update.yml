name: Auto Update Rankings

on:
  schedule:
    # Runs at 21:30 BRT (00:30 UTC) every day
    - cron: "30 0 * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/atualizar_rankings.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f resultados/ src/data/resultados/ data/lotofacil_cache.json
          git commit -m "chore: auto-update lottery results [skip ci]" || echo "No changes to commit"
          git push origin main
